# ComfyUI工作流配置文件
# 支持多种工作流类型：t2i(文生图), i2v(图生视频)

# prompt_skill 字段说明:
#   给 LLM 看的提示词写作技巧,包含正向 prompt 与负向 negativePrompt 的具体写法建议。
#   前端 Agent 调用 list_text2img_models 后,会据此撰写 prompt/create_images 参数,
#   create_images(prompt, negativePrompt, modelName) 提交任务,
#   后端 ComfyUIClient 把占位符替换进去:
#     - 「提示词在这里替换」     → prompt
#     - 「负向提示词在这里替换」 → negativePrompt (为空时保留工作流原值)
#
# 注意: image_z__768x1280.json(DBZ3-4k) 和 DBZ3-4k_00029_.json 用 ConditioningZeroOut
# 模拟负向,不含独立 CLIPTextEncode 节点,负向提示词传过去会被静默忽略,只能依赖正向 prompt。

t2i:
  - title: "动漫风17.5"
    path: "./comfyui_json/text2img/v17.5.json"
    description: "动漫/二次元风格,适合女性角色插画。checkpoints: miaomiao20harem175。"
    width: 768
    height: 1280
    prompt_skill: |
      适合英文 tag 逗号分隔风格,Danbooru/NovelAI 词表:
      - 结构: 数量+主体, 外观, 服饰, 动作, 表情, 场景, 视角, 画质
      - 例: "1girl, long white hair, blue eyes, school uniform, smile,
             cherry blossoms, upper body, looking at viewer,
             masterpiece, best quality, absurdres"
      - 权重语法: (keyword:1.3) 加权, [keyword] 降权, 推荐值 0.6~1.4
      - 负向建议 (英文): "worst quality, low quality, bad anatomy,
             bad hands, extra fingers, mutated, jpeg artifacts,
             watermark, signature, blurry, 3d, realistic"
      - 不要写自然语言长句;不要中英混杂;不要写画家名/平台名

  - title: "动漫风(竖)"
    path: "./comfyui_json/text2img/t2i_768x1280.json"
    description: "动漫/二次元风格竖版图,适合角色立绘。checkpoints: miaomiaoHarem_v18。"
    width: 768
    height: 1280
    prompt_skill: |
      同「动漫风17.5」风格,英文 tag 逗号分隔。
      - 偏好: 人物特征 (hair, eye, expression) + 服饰 (uniform, dress) +
        场景 (classroom, sunset) + 构图 (upper body, cowboy shot, full body)
      - 负向建议 (英文): "lowres, bad anatomy, bad hands, extra digits,
             fewer digits, cropped, worst quality, low quality,
             watermark, text, signature, blurry, jpeg artifacts"
      - 工作流会自动追加 ",masterpiece, best quality, ..." 等正向前缀,
        不用再手动加。

  - title: '写实1'
    path: "./comfyui_json/text2img/image_z__768x1280.json"
    description: "写实风格,基于 Z-Image Turbo 模型。⚠️ 用 ConditioningZeroOut 模拟负向,负向提示词不会生效。"
    width: 768
    height: 1280
    prompt_skill: |
      适合自然语言描述,而非 tag 列表:
      - 结构: 主体 + 外观 + 服饰 + 动作 + 场景 + 光线 + 镜头
      - 例: "A young woman with long white hair and blue eyes, wearing
             a school uniform, standing in a classroom at sunset,
             soft lighting, upper body portrait, photorealistic,
             8k, high detail"
      - 也可使用 (keyword:1.3) 局部加权,例如 "(blue eyes:1.2)"
      - ⚠️ 本工作流负向提示词不生效 (用 ConditioningZeroOut 而非独立负向节点),
        不要在 negativePrompt 写东西,正向 prompt 里直接用"photorealistic,
        high detail, sharp"等正向词保证质量。
      - 避免: 卡通词 (anime, manga), 抽象词 (abstract)

  - title: '写实2'
    path: "./comfyui_json/text2img/DBZ3-4k_00029_.json"
    description: "高分辨率写实风格,基于 DBZ3.1 4K UltraSharp 模型。⚠️ 用 ConditioningZeroOut 模拟负向,负向提示词不会生效。"
    width: 768
    height: 1280
    prompt_skill: |
      4K 超高清写实,基于 Flux 类架构:
      - 适合极详细的自然语言描述,越具体越好
      - 结构: 主体 + 外观细节 + 服饰材质 + 动作姿态 + 场景环境 + 光照氛围 +
        镜头参数 (e.g. 85mm portrait, f/1.4, shallow depth of field)
      - 例: "Close-up portrait of a young woman with silver hair and
             emerald eyes, wearing silk dress, soft golden hour lighting,
             detailed skin texture, 85mm lens, shallow depth of field,
             8k uhd, professional photography"
      - ⚠️ 本工作流负向提示词不生效,把"高质量"放在正向 prompt:
        "professional photography, 8k uhd, sharp focus, high detail,
         film grain, masterpiece"
      - 避免: 低质量词 (low quality, blurry), 卡通词 (anime, illustration)

i2v:
  - title: "视频生成"
    path: "./comfyui_json/img2video/i2v.json"
    description: "图片转视频工作流 (WanVideo)"

# 全局配置
settings:
  default_t2i_model: "动漫风17.5"
  api_timeout: 300
  max_concurrent_tasks: 5