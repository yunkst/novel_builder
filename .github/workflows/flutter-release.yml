name: Flutter Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'еҸ‘еёғ tagпјҲеҰӮ v1.7.21пјүпјҢйңҖе·ІеӯҳеңЁ'
        required: true
        type: string

permissions:
  contents: write

# йҒҝе…ҚеҗҢ tag е№¶еҸ‘еҸ‘еёғдә’зӣёиҰҶзӣ–
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: novel_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # з”ҹжҲҗ changelog йңҖиҰҒе®Ңж•ҙеҺҶеҸІ

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "name=${TAG}" >> $GITHUB_OUTPUT
          # дёҚеёҰ v еүҚзјҖзҡ„зәҜзүҲжң¬еҸ·
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Extract version code from pubspec
        id: version
        run: |
          # pubspec.yaml: version: 1.7.20+69
          # NOTE: defaults.working-directory = novel_app
          VERSION_CODE=$(grep -E "^version:" pubspec.yaml | sed -E 's/.*\+([0-9]+).*/\1/')
          if [ -z "$VERSION_CODE" ]; then
            echo "вқҢ ж— жі•д»Һ pubspec.yaml и§Јжһҗ version code"
            exit 1
          fi
          echo "code=${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Detect prerelease
        id: prerelease
        run: |
          if [[ "${{ steps.tag.outputs.name }}" =~ -(alpha|beta|rc|pre) ]]; then
            echo "flag=true" >> $GITHUB_OUTPUT
          else
            echo "flag=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog from tag message
        id: changelog
        run: |
          # д»Һ tag зҡ„ annotation message жҸҗеҸ– changelog
          # зәҰе®ҡж јејҸпјҡз¬¬дёҖиЎҢ "Release X.Y.Z"пјҢз©әиЎҢеҗҺжҳҜ changelog еҶ…е®№
          TAG_MSG=$(git tag -l --format='%(contents)' "${{ steps.tag.outputs.name }}")
          if [ -z "$TAG_MSG" ]; then
            echo "  вҡ пёҸ  tag ${{ steps.tag.outputs.name }} жІЎжңү annotation message"
            CHANGELOG="Bug дҝ®еӨҚе’ҢжҖ§иғҪдјҳеҢ–"
          else
            # и·іиҝҮз¬¬дёҖиЎҢ "Release X.Y.Z"пјҢи·іиҝҮдёҖдёӘз©әиЎҢпјҢеҸ–еү©дёӢзҡ„еҶ…е®№
            CHANGELOG=$(echo "$TAG_MSG" | tail -n +3)
            # еҰӮжһң tail еҗҺдёәз©әпјҲtag еҸӘжңүж ҮйўҳжІЎ changelogпјүпјҢз»ҷдёӘй»ҳи®Ө
            if [ -z "$(echo "$CHANGELOG" | tr -d '[:space:]')" ]; then
              CHANGELOG="Bug дҝ®еӨҚе’ҢжҖ§иғҪдјҳеҢ–"
            fi
          fi
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "===== жҸҗеҸ–еҲ°зҡ„ changelog ====="
          echo "$CHANGELOG"
          echo "=============================="

      - name: Render release body
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          # з”Ёе®һйҷ…зүҲжң¬еҸ·жӣҝжҚў {{VERSION}}пјҢз”Ё changelog жӣҝжҚў {{CHANGELOG}}
          # з”Ё Python йҒҝе…Қ sed зҡ„зү№ж®Ҡеӯ—з¬ҰпјҲ/гҖҒ&гҖҒ\гҖҒжҚўиЎҢпјүиҪ¬д№үй—®йўҳ
          # NOTE: defaults.working-directory = novel_appпјҢжүҖд»Ҙ ../.github = д»“еә“ж №
          python3 -c '
          import os
          with open("../.github/release_template.md", "r", encoding="utf-8") as f:
              body = f.read()
          body = body.replace("{{VERSION}}", "v" + os.environ["VERSION"])
          body = body.replace("{{CHANGELOG}}", os.environ["CHANGELOG"])
          with open("release_body.md", "w", encoding="utf-8") as f:
              f.write(body)
          '
          echo "===== жёІжҹ“еҗҺзҡ„ release_body.md ====="
          cat release_body.md

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -e
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "вқҢ зјәе°‘ secret ANDROID_KEYSTORE_BASE64пјҢиҜ·еңЁд»“еә“ Settings вҶ’ Secrets й…ҚзҪ®"
            exit 1
          fi
          # keystore ж”ҫеңЁ android ж №зӣ®еҪ•пјҲrootProjectпјүпјҢkey.properties дёӯзҡ„ storeFile з”Ё rootProject.file и§Јжһҗ
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/novel-app-release-key.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=novel-app-release-key.jks
          EOF
          echo "вң… keystore и§Јз Ғе®ҢжҲҗпјҢkey.properties е·Із”ҹжҲҗ"
          ls -la android/novel-app-release-key.jks

      - name: Build per-architecture release APKs
        run: flutter build apk --release --split-per-abi

      - name: Compute SHA256 checksums
        working-directory: novel_app/build/app/outputs/flutter-apk
        run: |
          sha256sum app-*-release.apk > SHA256SUMS.txt
          echo "===== SHA256SUMS.txt ====="
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body_path: novel_app/release_body.md
          draft: ${{ steps.prerelease.outputs.flag == 'true' }}
          prerelease: ${{ steps.prerelease.outputs.flag == 'true' }}
          files: |
            novel_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            novel_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            novel_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
            novel_app/build/app/outputs/flutter-apk/SHA256SUMS.txt
