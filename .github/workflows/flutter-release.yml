name: Flutter Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: novel_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          VERSION_CODE=$(grep -E "^version:" novel_app/pubspec.yaml | sed -E 's/.*\+//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "## Novel Builder v${VERSION}" > release_body.md
          echo "" >> release_body.md
          echo "**版本代码**: ${VERSION_CODE}" >> release_body.md
          echo "" >> release_body.md
          echo "### 安装说明" >> release_body.md
          echo "1. 下载下方的 \`app-release.apk\`" >> release_body.md
          echo "2. 在 Android 设备上安装" >> release_body.md
          echo "3. 首次启动配置后端 API 地址" >> release_body.md
          echo "" >> release_body.md
          echo "### 完整更新日志" >> release_body.md
          echo "请查看 [CHANGELOG.md](https://github.com/yunkst/novel_builder/blob/master/CHANGELOG.md)" >> release_body.md

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        run: flutter build apk --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            novel_app/build/app/outputs/flutter-apk/app-release.apk
          body_path: novel_app/release_body.md
