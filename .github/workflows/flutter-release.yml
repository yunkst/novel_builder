name: Flutter Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: novel_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          VERSION_CODE=$(grep -E "^version:" novel_app/pubspec.yaml | sed -E 's/.*\+//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        run: flutter build apk --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            novel_app/build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## Novel Builder v${{ steps.version.outputs.version }}

            **版本代码**: ${{ steps.version.outputs.version_code }}

            ### 安装说明
            1. 下载下方的 `app-release.apk`
            2. 在 Android 设备上安装
            3. 首次启动配置后端 API 地址

            ### 完整更新日志
            请查看 [CHANGELOG.md](../../blob/master/CHANGELOG.md)
