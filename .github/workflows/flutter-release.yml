name: Flutter Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '发布 tag（如 v1.7.21），需已存在'
        required: true
        type: string

permissions:
  contents: write

# 避免同 tag 并发发布互相覆盖
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: novel_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 生成 changelog 需要完整历史

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "name=${TAG}" >> $GITHUB_OUTPUT
          # 不带 v 前缀的纯版本号
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Extract version code from pubspec
        id: version
        run: |
          # pubspec.yaml: version: 1.7.20+69
          # NOTE: defaults.working-directory = novel_app
          VERSION_CODE=$(grep -E "^version:" pubspec.yaml | sed -E 's/.*\+([0-9]+).*/\1/')
          if [ -z "$VERSION_CODE" ]; then
            echo "❌ 无法从 pubspec.yaml 解析 version code"
            exit 1
          fi
          echo "code=${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Detect prerelease
        id: prerelease
        run: |
          if [[ "${{ steps.tag.outputs.name }}" =~ -(alpha|beta|rc|pre) ]]; then
            echo "flag=true" >> $GITHUB_OUTPUT
          else
            echo "flag=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog from tag message
        id: changelog
        run: |
          # 从 tag 的 annotation message 提取 changelog
          # 方案：用 git cat-file -p 直接读取 tag object 的原始内容（最可靠）
          # %(contents) / %(body) 在 GitHub Actions runner 上对远程 tag 可能返回空值
          TAG_REF="${{ steps.tag.outputs.name }}"
          # 获取 tag object SHA
          TAG_OBJ=$(git rev-parse "$TAG_REF"^{tag} 2>/dev/null || git rev-parse "$TAG_REF")
          # cat-file -p 输出完整 tag message（header + body），body 从第一个空行后开始
          TAG_RAW=$(git cat-file -p "$TAG_OBJ" 2>/dev/null || echo "")
          if [ -z "$TAG_RAW" ]; then
            echo "  ⚠️  tag $TAG_REF 没有 annotation message"
            CHANGELOG="Bug 修复和性能优化"
          else
            # cat-file -p 输出: header lines → 空行 → "Release X.Y.Z" → 空行 → changelog
            # sed 取空行后的全部内容,再 tail -n +3 跳过 "Release X.Y.Z" 和空行
            CHANGELOG=$(echo "$TAG_RAW" | sed -n '/^$/,$ p' | tail -n +3)
            if [ -z "$(echo "$CHANGELOG" | tr -d '[:space:]')" ]; then
              CHANGELOG="Bug 修复和性能优化"
            fi
          fi
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "===== 提取到的 changelog ====="
          echo "$CHANGELOG"
          echo "=============================="

      - name: Render release body
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          # 用实际版本号替换 {{VERSION}}，用 changelog 替换 {{CHANGELOG}}
          # 用 Python 避免 sed 的特殊字符（/、&、\、换行）转义问题
          # NOTE: defaults.working-directory = novel_app，所以 ../.github = 仓库根
          python3 -c '
          import os
          with open("../.github/release_template.md", "r", encoding="utf-8") as f:
              body = f.read()
          body = body.replace("{{VERSION}}", "v" + os.environ["VERSION"])
          body = body.replace("{{CHANGELOG}}", os.environ["CHANGELOG"])
          with open("release_body.md", "w", encoding="utf-8") as f:
              f.write(body)
          '
          echo "===== 渲染后的 release_body.md ====="
          cat release_body.md

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -e
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "❌ 缺少 secret ANDROID_KEYSTORE_BASE64，请在仓库 Settings → Secrets 配置"
            exit 1
          fi
          # keystore 放在 android 根目录（rootProject），key.properties 中的 storeFile 用 rootProject.file 解析
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/novel-app-release-key.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=novel-app-release-key.jks
          EOF
          echo "✅ keystore 解码完成，key.properties 已生成"
          ls -la android/novel-app-release-key.jks

      - name: Build per-architecture release APKs
        run: flutter build apk --release --split-per-abi

      - name: Compute SHA256 checksums
        working-directory: novel_app/build/app/outputs/flutter-apk
        run: |
          sha256sum app-*-release.apk > SHA256SUMS.txt
          echo "===== SHA256SUMS.txt ====="
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body_path: novel_app/release_body.md
          draft: ${{ steps.prerelease.outputs.flag == 'true' }}
          prerelease: ${{ steps.prerelease.outputs.flag == 'true' }}
          files: |
            novel_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            novel_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            novel_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
            novel_app/build/app/outputs/flutter-apk/SHA256SUMS.txt
