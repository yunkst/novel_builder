name: Flutter Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '发布 tag（如 v1.7.21），需已存在'
        required: true
        type: string

permissions:
  contents: write

# 避免同 tag 并发发布互相覆盖
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: novel_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 生成 changelog 需要完整历史

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "name=${TAG}" >> $GITHUB_OUTPUT
          # 不带 v 前缀的纯版本号
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Extract version code from pubspec
        id: version
        run: |
          # pubspec.yaml: version: 1.7.20+69
          # NOTE: defaults.working-directory = novel_app
          VERSION_CODE=$(grep -E "^version:" pubspec.yaml | sed -E 's/.*\+([0-9]+).*/\1/')
          if [ -z "$VERSION_CODE" ]; then
            echo "❌ 无法从 pubspec.yaml 解析 version code"
            exit 1
          fi
          echo "code=${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Detect prerelease
        id: prerelease
        run: |
          if [[ "${{ steps.tag.outputs.name }}" =~ -(alpha|beta|rc|pre) ]]; then
            echo "flag=true" >> $GITHUB_OUTPUT
          else
            echo "flag=false" >> $GITHUB_OUTPUT
          fi

      - name: Render release body
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          # 用实际版本号替换模板占位符，输出到 working-directory 根
          # NOTE: defaults.working-directory = novel_app，所以 ../.github = 仓库根
          sed "s|{{VERSION}}|v${VERSION}|g" \
            ../.github/release_template.md > release_body.md
          echo "===== 渲染后的 release_body.md ====="
          cat release_body.md

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -e
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "❌ 缺少 secret ANDROID_KEYSTORE_BASE64，请在仓库 Settings → Secrets 配置"
            exit 1
          fi
          # keystore 放在 android 根目录（rootProject），key.properties 中的 storeFile 用 rootProject.file 解析
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/novel-app-release-key.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=novel-app-release-key.jks
          EOF
          echo "✅ keystore 解码完成，key.properties 已生成"
          ls -la android/novel-app-release-key.jks

      - name: Build per-architecture release APKs
        run: flutter build apk --release --split-per-abi

      - name: Compute SHA256 checksums
        working-directory: build/app/outputs/flutter-apk
        run: |
          sha256sum app-*-release.apk > SHA256SUMS.txt
          echo "===== SHA256SUMS.txt ====="
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body_path: novel_app/release_body.md
          draft: ${{ steps.prerelease.outputs.flag == 'true' }}
          prerelease: ${{ steps.prerelease.outputs.flag == 'true' }}
          files: |
            novel_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            novel_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            novel_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
            novel_app/build/app/outputs/flutter-apk/SHA256SUMS.txt
