# 测试运行配置
#
# 说明：backup_service_test 中的 restoreBackup 测试通过 DatabaseConnection()
# 操作全局共享路径下的 novel_reader.db 文件。并发测试会互相干扰
# （一个测试 rename/delete 文件时，另一个正好打开 → PathNotFoundException）。
#
# 解决方案：CI 中用 `flutter test -j 1` 串行执行（见 .github/workflows/flutter-ci.yml），
# 本地开发也用 `-j 1` 避免竞态。
#
# 此文件作为说明性文档保留（flutter test 不读取 dart_test.yaml 中的 concurrency 设置）。
#
# 运行测试：
#   flutter test --no-pub -j 1 test/unit/ test/bug/ test/verification/
