org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Kotlin 增量编译与跨 Windows 盘符（Pub cache 在 C:, 项目在 D:）冲突，
# 会抛出 "this and base files have different roots" / "Storage is already registered" 错误。
# 强制关闭 Kotlin daemon 与增量编译，以稳定性优先。
systemProp.kotlin.incremental=false
systemProp.kotlin.compiler.execution.strategy="in-process"
kotlin.daemon.jvmargs=-Xmx2G
org.gradle.daemon=false
# 彻底关闭 Kotlin compile daemon（跨盘符问题根因）
kotlin.compiler.execution.strategy=in-process
systemProp.kotlin.daemon.jvm.options=-Xmx2G
