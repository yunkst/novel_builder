# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# Official Dart recommended lint set (includes core lints).
# See https://pub.dev/packages/lints for details.
include: package:lints/recommended.yaml

analyzer:
  # Promote unused-code diagnostics from info to warning so they are visible
  # in `flutter analyze` output and IDEs, rather than silently ignored.
  errors:
    unused_import: warning
    unused_element: warning
    unused_field: warning
    unused_local_variable: warning
    dead_code: warning
    unnecessary_import: warning
    unused_shown_name: warning
  exclude:
    # 排除生成的 API 代码
    - lib/generated/**
    - generated/**
    # 排除构建生成的文件
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    # 排除测试目录
    - test/**
    # 排除工具脚本目录
    - tool/**

linter:
  # The lint rules applied to this project can be customized in the
  # section below to disable rules from `package:lints/recommended.yaml`
  # included above or to enable additional rules.
