services:
  backend:
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile.debug
    ports:
      - "3800:8000"
      - "6678:5678"   # Debugpy debugger port
    volumes:
      # 添加这行，把本地 backend 目录挂载到容器中
      - ./backend:/app
      # 小说同步目录映射
      - D:/myspace/nov:/app/novel_sync
      # ComfyUI 模型目录挂载
      - D:/Comfyui/ComfyUI_windows_portable/ComfyUI/models:/app/models
    environment:
      - NOVEL_API_TOKEN=${NOVEL_API_TOKEN}
      - DATABASE_URL=postgresql://novel_user:novel_pass@postgres:5432/novel_db
      # 代理配置 - 使用宿主机代理
      - HTTP_PROXY=http://host.docker.internal:7897
      - HTTPS_PROXY=http://host.docker.internal:7897
      - NO_PROXY=localhost,127.0.0.1,postgres,host.docker.internal
      # ComfyUI服务配置（文生图/图生视频后端）
      - COMFYUI_API_URL=http://host.docker.internal:8188
      # ComfyUI 模型目录（与 volumes 挂载点一致）
      - COMFYUI_MODELS_DIR=/app/models
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    restart: unless-stopped
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=novel_user
      - POSTGRES_PASSWORD=novel_pass
      - POSTGRES_DB=novel_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel_user -d novel_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
